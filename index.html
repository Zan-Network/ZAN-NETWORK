<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAN NETWORK | GTA VI Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background: #0f0f10; color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .neon-text { text-shadow: 0 0 10px rgba(255,0,127,0.8), 0 0 20px rgba(0,242,255,0.5); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { transition: 0.3s; cursor: pointer; border-radius: 15px; }
        .nav-btn:hover, .nav-btn.active { background: #ff007f; box-shadow: 0 0 15px #ff007f; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bg-vice { background: linear-gradient(45deg, #ff007f, #00f2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <h1 class="text-3xl font-black neon-text">ZAN NETWORK</h1>
        <div class="glass px-4 py-2 rounded-full text-[10px] uppercase tracking-tighter text-cyan-400">
            ● Server: Online
        </div>
    </header>

    <nav class="flex flex-wrap justify-center gap-2 p-4 mb-10">
        <div class="nav-btn active px-6 py-3 glass" onclick="openTab(event, 'inicio')"><i class="fa-solid fa-house mr-2"></i> INICIO</div>
        <div class="nav-btn px-6 py-3 glass" onclick="openTab(event, 'personajes')"><i class="fa-solid fa-users mr-2"></i> PERSONAJES</div>
        <div class="nav-btn px-6 py-3 glass" onclick="openTab(event, 'mapa')"><i class="fa-solid fa-map-location-dot mr-2"></i> MAPA</div>
        <div class="nav-btn px-6 py-3 glass" onclick="openTab(event, 'biblioteca')"><i class="fa-solid fa-book mr-2"></i> BIBLIOTECA</div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 pb-20">

        <div id="inicio" class="tab-content active text-center">
            <h2 class="text-6xl md:text-8xl font-black mb-4 bg-vice">GTA VI</h2>
            <p class="text-xl opacity-60 mb-12 uppercase tracking-[0.3em]">Regreso a Vice City</p>
            
            <div class="flex flex-wrap justify-center gap-4">
                <div class="glass p-6 rounded-3xl min-w-[120px]">
                    <div class="text-5xl font-black text-pink-500">223</div>
                    <div class="text-xs uppercase opacity-50">Días</div>
                </div>
                <div class="glass p-6 rounded-3xl min-w-[120px]">
                    <div class="text-5xl font-black text-cyan-400">07</div>
                    <div class="text-xs uppercase opacity-50">Horas</div>
                </div>
                <div class="glass p-6 rounded-3xl min-w-[120px]">
                    <div class="text-5xl font-black text-purple-500">45</div>
                    <div class="text-xs uppercase opacity-50">Minutos</div>
                </div>
            </div>
        </div>

        <div id="personajes" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-8 rounded-[40px] border-l-8 border-pink-500 flex items-center gap-6">
                    <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-pink-500 to-purple-600 flex items-center justify-center text-3xl font-black">L</div>
                    <div>
                        <h3 class="text-3xl font-black">LUCIA</h3>
                        <p class="text-pink-400 uppercase text-xs font-bold tracking-widest">Ex-convicta / Liderazgo</p>
                    </div>
                </div>
                <div class="glass p-8 rounded-[40px] border-l-8 border-cyan-500 flex items-center gap-6">
                    <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-3xl font-black">J</div>
                    <div>
                        <h3 class="text-3xl font-black">JASON</h3>
                        <p class="text-cyan-400 uppercase text-xs font-bold tracking-widest">Conductor / Lealtad</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="mapa" class="tab-content">
            <div class="glass p-4 rounded-3xl overflow-hidden mb-6">
                <img src="https://api.screenshotmachine.com/?key=ca3298&url=https://www.google.com/maps&dimension=1024x768" class="w-full h-[400px] object-cover rounded-2xl opacity-50" alt="Mapa">
                <div class="p-6">
                    <input type="text" placeholder="Buscar lugar en Leonida..." class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-pink-500">
                </div>
            </div>
        </div>

        <div id="biblioteca" class="tab-content">
            <div class="flex gap-4 mb-8 overflow-x-auto pb-2">
                <button class="px-6 py-2 glass rounded-full hover:bg-white/10">Vehículos</button>
                <button class="px-6 py-2 glass rounded-full hover:bg-white/10">Armas</button>
                <button class="px-6 py-2 glass rounded-full hover:bg-white/10">Animales</button>
            </div>
            <input type="text" placeholder="Buscar en la base de datos..." class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-10">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 opacity-40 italic">
                Cargando registros del arsenal...
            </div>
        </div>

    </div>

    <script>
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].classList.remove("active");
            }
            tablinks = document.getElementsByClassName("nav-btn");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
